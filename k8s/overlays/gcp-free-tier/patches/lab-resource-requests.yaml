apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cassandra
  namespace: thehive
spec:
  template:
    spec:
      containers:
        - name: cassandra
          resources:
            requests:
              cpu: "250m"
              memory: "1280Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch
  namespace: thehive
spec:
  template:
    spec:
      containers:
        - name: elasticsearch
          resources:
            requests:
              cpu: "250m"
              memory: "1280Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: thehive
  namespace: thehive
spec:
  template:
    spec:
      containers:
        - name: thehive
          resources:
            requests:
              cpu: "250m"
              memory: "1536Mi"
            limits:
              cpu: "1500m"
              memory: "3Gi"
