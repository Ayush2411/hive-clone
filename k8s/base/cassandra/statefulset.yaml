apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cassandra
  namespace: thehive
  labels:
    app.kubernetes.io/name: cassandra
spec:
  serviceName: cassandra
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cassandra
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cassandra
    spec:
      securityContext:
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cassandra
          image: cassandra:4.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: cql
              containerPort: 9042
            - name: intra-node
              containerPort: 7000
          env:
            - name: CASSANDRA_CLUSTER_NAME
              value: thehive
            - name: CASSANDRA_DC
              value: gcp
            - name: CASSANDRA_RACK
              value: rack1
            - name: CASSANDRA_ENDPOINT_SNITCH
              value: GossipingPropertyFileSnitch
            - name: MAX_HEAP_SIZE
              value: 1024M
            - name: HEAP_NEWSIZE
              value: 256M
          readinessProbe:
            exec:
              command: ["bash", "-c", "cqlsh -e 'DESCRIBE KEYSPACES' localhost 9042"]
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 10
          livenessProbe:
            tcpSocket:
              port: cql
            initialDelaySeconds: 180
            periodSeconds: 30
          resources:
            requests:
              cpu: "500m"
              memory: "1536Mi"
            limits:
              cpu: "1500m"
              memory: "2Gi"
          volumeMounts:
            - name: data
              mountPath: /var/lib/cassandra
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard-rwo
        resources:
          requests:
            storage: 20Gi
