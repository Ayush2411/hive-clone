apiVersion: apps/v1
kind: Deployment
metadata:
  name: thehive
  namespace: thehive
  labels:
    app.kubernetes.io/name: thehive
    app.kubernetes.io/component: soar
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: thehive
      app.kubernetes.io/component: soar
  template:
    metadata:
      labels:
        app.kubernetes.io/name: thehive
        app.kubernetes.io/component: soar
      annotations:
        gke-gcsfuse/volumes: "true"
    spec:
      serviceAccountName: thehive
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-cassandra
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z cassandra.thehive.svc.cluster.local 9042; do echo waiting for cassandra; sleep 5; done"]
        - name: wait-for-elasticsearch
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z elasticsearch.thehive.svc.cluster.local 9200; do echo waiting for elasticsearch; sleep 5; done"]
      containers:
        - name: thehive
          image: strangebee/thehive:5.6.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9000
          env:
            - name: THEHIVE_SECRET
              valueFrom:
                secretKeyRef:
                  name: thehive-secrets
                  key: thehive-secret
            - name: JAVA_OPTS
              value: "-Xms768m -Xmx1536m"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "1500m"
              memory: "3Gi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/thehive/application.conf
              subPath: application.conf
              readOnly: true
            - name: attachments
              mountPath: /opt/thp/thehive/files
      volumes:
        - name: config
          configMap:
            name: thehive-config
        - name: attachments
          csi:
            driver: gcsfuse.csi.storage.gke.io
            readOnly: false
            volumeAttributes:
              bucketName: PROJECT_ID-thehive-attachments
              mountOptions: "implicit-dirs"
